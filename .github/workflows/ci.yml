name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install core + dev deps
        run: pip install -e ".[dev]"

      - name: Smoke test imports
        run: |
          python -c "
          from screenpilot.config import ScreenPilotConfig, CaptureRegion
          from screenpilot.utils.geometry import Rect, Point, iou
          from screenpilot.utils.timing import FPSCounter, Timer
          from screenpilot.capture.change_detector import ChangeDetector, ChangeLevel
          from screenpilot.core.application_pack import ApplicationPack, PackMetadata
          from screenpilot.core.model_registry import ModelRegistry
          from screenpilot.core.app_router import AppRouter
          from screenpilot.training.collector import DataCollector
          from screenpilot.training.trainer import PackTrainer
          from screenpilot.training.dataset_prep import split_dataset
          print('All imports OK')
          "

      - name: Ruff lint
        run: ruff check screenpilot/

      - name: Ruff format check
        run: ruff format --check screenpilot/

      - name: Run tests
        run: pytest tests/ -v --tb=short
