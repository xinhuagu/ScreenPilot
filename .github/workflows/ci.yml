name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install core + dev deps
        run: pip install -e ".[dev]"

      - name: Smoke test imports
        run: |
          python -c "
          from gazefy.config import GazefyConfig, CaptureRegion
          from gazefy.utils.geometry import Rect, Point, iou
          from gazefy.utils.timing import FPSCounter, Timer
          from gazefy.capture.change_detector import ChangeDetector, ChangeLevel
          from gazefy.core.application_pack import ApplicationPack, PackMetadata
          from gazefy.core.model_registry import ModelRegistry
          from gazefy.core.app_router import AppRouter
          from gazefy.training.collector import DataCollector
          from gazefy.training.trainer import PackTrainer
          from gazefy.training.dataset_prep import split_dataset
          from gazefy.tracker.ui_map import UIMap, UIElement, Detection, UIMapDiff
          from gazefy.tracker.element_tracker import ElementTracker
          from gazefy.actions.action_types import Action, ActionResult, ActionType
          from gazefy.actions.coordinate_transform import CoordinateTransform
          from gazefy.llm.formatters import format_state
          from gazefy.llm.parsers import parse_actions
          print('All imports OK')
          "

      - name: Ruff lint
        run: ruff check gazefy/

      - name: Ruff format check
        run: ruff format --check gazefy/

      - name: Run tests
        run: pytest tests/ -v --tb=short
